name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ---------- lint ----------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (bash script)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

      - name: Python syntax check
        run: python3 -m py_compile src/pdanet-gui.py

      - name: Check desktop file
        run: desktop-file-validate system/pdanet-gui.desktop

  # ---------- build Arch package ----------
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          pacman -Syu --noconfirm base-devel git

      - name: Install PKGBUILD deps (as root)
        run: |
          pacman -S --noconfirm bash curl networkmanager python python-gobject gtk4 libadwaita

      - name: Build package (makepkg -s)
        run: |
          chown -R nobody: .
          runuser -u nobody -- makepkg -sf --noconfirm --nocheck
        env:
          PKGEXT: .pkg.tar.zst

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.*"

  # ---------- build Debian package ----------
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper desktop-file-utils

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: ../*.deb

  # ---------- release artifacts ----------
  release:
    if: github.event_name == 'release'
    needs: [lint, build-arch, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create source tarball
        run: |
          VERSION=$(git describe --tags --always)
          git archive --format=tar.gz --prefix="pdanet-linux-${VERSION}/" HEAD \
            > "pdanet-linux-${VERSION}.tar.gz"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arch-package/*.pkg.tar.*
            deb-package/*.deb
            pdanet-linux-*.tar.gz
